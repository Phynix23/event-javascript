<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validation</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      padding: 50px;
    }

    form {
      max-width: 400px;
      margin: 20px 0;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .error {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }

    .success {
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
    <h1>Form Validation</h1>
    <form id="nameForm">
        <input type="text" id="nameInput" placeholder="Enter your name here">
        <button type="submit">Submit</button>
        <div id="formMessage"></div>
    </form>

    <script>
        const form = document.getElementById('nameForm');
        const nameInput = document.getElementById('nameInput');
        const formMessage = document.getElementById('formMessage');
        
        form.addEventListener('submit', (event) => {
            event.preventDefault();
            
            const name = nameInput.value.trim();
            
            if (name === '') {
                formMessage.innerHTML = '<div class="error">Name is required</div>';
            } else {
                formMessage.innerHTML = `<div class="success">Welcome, ${name}!</div>`;
                nameInput.value = '';
            }
        });
    </script>
</body>
</html>
